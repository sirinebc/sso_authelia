services:
  reverse-proxy:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - ./certs:/etc/nginx/certs
    networks:
      net:
        aliases:
          - auth.test.local

  authelia:
    image: authelia/authelia
    volumes:
      - ./authelia:/config
    networks:
    - net

  mongodb:
    image: mongo:8
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    networks:
      - net
  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap
    command: --copy-service --loglevel debug
    environment:
      LDAP_ORGANISATION: "TechSolutions"
      LDAP_DOMAIN: "techsolutions.com"
      LDAP_BASE_DN: "dc=techsolutions,dc=com"
      LDAP_ADMIN_PASSWORD: "AdminLDAP2026!"
      LDAP_CONFIG_PASSWORD: "AdminLDAP2026!"
      LDAP_TLS: "false"
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "false"
    volumes:
      - ./ldap/data:/var/lib/ldap
      - ./ldap/config:/etc/ldap/slapd.d
      - ./ldap/bootstrap:/container/service/slapd/assets/config/bootstrap/ldif/custom
    networks:
      - net

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8081:80"
    depends_on:
      - openldap
    networks:
      - net
  rocketchat:
    build:
      context: .
      dockerfile: rocketchat/Dockerfile
    environment:
      MONGO_URL: mongodb://mongodb:27017/rocketchat?replicaSet=rs0
      ROOT_URL: https://rocket.test.local
      PORT: 3000
    secrets:
      - rocketchat_oidc_secret
    depends_on:
      - mongodb
    networks:
      - net

  confluence:
    build:
      context: .
      dockerfile: confluence/Dockerfile
    secrets:
      - confluence_oidc_secret
    depends_on:
      - postgres-confluence
    volumes:
      - confluence_data:/var/atlassian/application-data/confluence
    networks:
      - net
  postgres-confluence:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=confluence
      - POSTGRES_USER=confluence
      - POSTGRES_PASSWORD=confluencepassword
    volumes:
      - confluence_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - net
networks:
  net:

volumes:
  mongo_data:
  confluence_data:
  confluence_pg_data:
secrets:
  rocketchat_oidc_secret:
    file: ./secrets/rocketchat_oidc_secret
  confluence_oidc_secret:
    file: ./secrets/confluence_oidc_secret