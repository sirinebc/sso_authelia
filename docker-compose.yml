services: 

  reverse-proxy :
    image : nginx:alpine
    ports: 
      - "443:443" 
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - ./certs:/etc/nginx/certs
    networks: 
      net:
        aliases:
          - auth.test.local

  authelia:
    image : authelia/authelia
    secrets: ['authelia_oidc_key', 'authelia_jwt_secret', 'authelia_session_secret', 'authelia_storage_key','authelia_hmac_secret']
    environment:
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE: /run/secrets/authelia_jwt_secret
      AUTHELIA_SESSION_SECRET_FILE: /run/secrets/authelia_session_secret
      AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE: /run/secrets/authelia_storage_key
      AUTHELIA_IDENTITY_PROVIDERS_OIDC_ISSUER_PRIVATE_KEY_FILE: /run/secrets/authelia_oidc_key
      AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET_FILE: /run/secrets/authelia_hmac_secret
    volumes: 
      - ./authelia:/config
    networks: 
      - net
      
  confluence:
    build:
      context: . 
      dockerfile: confluence/Dockerfile
    depends_on:
      - postgres-confluence
    environment:
      ATL_PROXY_NAME: confluence.test.local
      ATL_PROXY_PORT: 443
      ATL_TOMCAT_SCHEME: https
      ATL_TOMCAT_SECURE: "true"
      JVM_MINIMUM_MEMORY: 1024m
      JVM_MAXIMUM_MEMORY: 2048m
    volumes:
      - confluence_data:/var/atlassian/application-data/confluence
    networks:
      - net 
  postgres-confluence:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=confluence
      - POSTGRES_USER=confluence
      - POSTGRES_PASSWORD=confluencepassword
    volumes:
      - confluence_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - net
      
  mongodb:
    image: mongo:8
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    networks:
      - net
      
  rocketchat:
    build:
      context: .
      dockerfile: rocketchat/Dockerfile
    environment:
      MONGO_URL: mongodb://mongodb:27017/rocketchat?replicaSet=rs0
      ROOT_URL: https://rocket.test.local
      PORT: 3000
      NODE_EXTRA_CA_CERTS: /usr/local/share/ca-certificates/rootCA.crt
    secrets:
      - rocketchat_oidc_secret
    depends_on:
      - mongodb
    networks:
      - net


  jira-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=jiradb
      - POSTGRES_USER=jira
      - POSTGRES_PASSWORD=jira
    volumes:
      - jira_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jira -d jiradb"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - net

  nextcloud:
    image: nextcloud:apache
    depends_on:
      - authelia
    entrypoint:
      - /bin/sh
      - /usr/local/bin/custom-entrypoint.sh
    environment:
      - NEXTCLOUD_TRUSTED_DOMAINS=nextcloud.test.local
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD_FILE=/run/secrets/nextcloud_admin_password
      - OVERWRITEHOST=nextcloud.test.local
      - OVERWRITEPROTOCOL=https
      - OVERWRITECLIURL=https://nextcloud.test.local
      - TRUSTED_PROXIES=172.16.0.0/12
    volumes:
      - nextcloud_data:/var/www/html
      - ./nextcloud/docker-entrypoint.sh:/usr/local/bin/custom-entrypoint.sh:ro
      - ./certs/rootCA.pem:/usr/local/share/ca-certificates/rootCA.crt:ro
      - ./nextcloud/entrypoint-hooks:/docker-entrypoint-hooks.d/before-starting:ro
      - ./secrets:/run/secrets:ro
    networks:
      - net

  jira:
    build:
      context: .
      dockerfile: jira/Dockerfile
    depends_on:
      authelia:
        condition: service_started
      jira-db:
        condition: service_healthy
    environment:
      - ATL_PROXY_NAME=jira.test.local
      - ATL_PROXY_PORT=443
      - ATL_TOMCAT_SCHEME=https
      - ATL_TOMCAT_SECURE=true
      - ATL_JDBC_URL=jdbc:postgresql://jira-db:5432/jiradb
      - ATL_JDBC_USER=jira
      - ATL_JDBC_PASSWORD=jira
      - JVM_MINIMUM_MEMORY=1024m
      - JVM_MAXIMUM_MEMORY=2048m
    command:
      - /bin/bash
      - -lc
      - |
        if [ -f /var/atlassian/application-data/jira/dbconfig.xml ] && grep -q '<url></url>' /var/atlassian/application-data/jira/dbconfig.xml; then
          echo "Removing invalid dbconfig.xml to let Jira bootstrap from ATL_JDBC_*";
          rm -f /var/atlassian/application-data/jira/dbconfig.xml;
        fi;
        exec /entrypoint.py
    volumes:
      - ./jira/data:/var/atlassian/application-data/jira
      - ./secrets:/run/secrets:ro
    networks:
      - net
      
  gitlab:
    image : gitlab/gitlab-ce
    secrets:
      - source: gitlab_oidc_secret
    volumes:
      - ./gitlab:/etc/gitlab
      - ./certs/rootCA.pem:/etc/gitlab/trusted-certs/rootCA.pem
    networks: 
      - net
      
  jenkins: 
    build : 
      context: . 
      dockerfile: jenkins/Dockerfile
    environment : 
      # évite de lancer le wizard d'installation au premier startup de jenkins
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      # ou trouver le fichier de config pour configuration as code de jenkins
      - CASC_JENKINS_CONFIG=/usr/share/jenkins/casc.yml
    secrets:
      - source: jenkins_oidc_secret
    volumes:
      - ./jenkins/casc.yml:/usr/share/jenkins/casc.yml
    networks: 
      - net
      
networks:
  net:
volumes:
  nextcloud_data:
      external: true
  jira_db_data:
      external: true
  mongo_data:
      external: true
  confluence_data:
      external: true
  confluence_pg_data:
      external: true
secrets:
  authelia_oidc_key:
    file: ./secrets/authelia_oidc_key
  gitlab_oidc_secret:
    file: ./secrets/gitlab_oidc_secret    
  jenkins_oidc_secret:
    file: ./secrets/jenkins_oidc_secret   
  authelia_jwt_secret:
    file: ./secrets/authelia_jwt_secret
  authelia_session_secret:
    file: ./secrets/authelia_session_secret
  authelia_storage_key:
    file: ./secrets/authelia_storage_key
  authelia_hmac_secret:
    file: ./secrets/authelia_hmac_secret
  rocketchat_oidc_secret:
    file: ./secrets/rocketchat_oidc_secret
  confluence_oidc_secret:
    file: ./secrets/confluence_oidc_secret