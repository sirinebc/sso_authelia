server {
    listen 443 ssl;
    server_name auth.test.local;
    ssl_certificate     /etc/nginx/certs/_wildcard.test.local.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.test.local-key.pem;

    location / {
        proxy_pass http://authelia:9091;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host; 
    }
}

server {
    listen 443 ssl;
    server_name confluence.test.local;

    ssl_certificate     /etc/nginx/certs/_wildcard.test.local.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.test.local-key.pem;

    location = /internal/authelia/authz {
        internal;
        proxy_pass http://authelia:9091/api/authz/auth-request;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-URI $request_uri;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Content-Length "";
        proxy_set_header Connection "";
        proxy_pass_request_body off;
    }

    location / {
        auth_request /internal/authelia/authz;
        error_page 401 =302 https://auth.test.local/?rd=$scheme://$http_host$request_uri;

        auth_request_set $auth_remote_user   $upstream_http_remote_user;
        auth_request_set $auth_remote_groups $upstream_http_remote_groups;
        auth_request_set $auth_remote_name   $upstream_http_remote_name;
        auth_request_set $auth_remote_email  $upstream_http_remote_email;

        proxy_pass http://confluence:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_set_header Remote-User   $auth_remote_user;
        proxy_set_header Remote-Groups $auth_remote_groups;
        proxy_set_header Remote-Name   $auth_remote_name;
        proxy_set_header Remote-Email  $auth_remote_email;
    }
}

server {
    listen 443 ssl;
    server_name rocket.test.local;
    ssl_certificate     /etc/nginx/certs/_wildcard.test.local.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.test.local-key.pem;

    location = /internal/authelia/authz {
        internal;
        proxy_pass http://authelia:9091/api/authz/auth-request;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-URI $request_uri;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Content-Length "";
        proxy_set_header Connection "";
        proxy_pass_request_body off;
    }

    location / {
        auth_request /internal/authelia/authz;
        error_page 401 =302 https://auth.test.local/?rd=$scheme://$http_host$request_uri;

        proxy_pass http://rocketchat:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Nginx-Proxy true;
        proxy_redirect off;
    }
}

