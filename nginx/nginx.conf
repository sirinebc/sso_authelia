server {
    listen 443 ssl;
    server_name auth.test.local;
    ssl_certificate     /etc/nginx/certs/_wildcard.test.local.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.test.local-key.pem;

    location / {
        proxy_pass http://authelia:9091; # les communications entre conteneurs sont en http
        proxy_set_header Host $host; # authelia vérifie que la req vient de domain = auth.test.local
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host; 
    }
}
server {
    listen 443 ssl;
    server_name rocket.test.local;
    ssl_certificate     /etc/nginx/certs/_wildcard.test.local.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.test.local-key.pem;

    location / {
        proxy_pass http://rocketchat:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Nginx-Proxy true;
        proxy_redirect off;
    }
}    

server {
    listen 443 ssl;
    server_name confluence.test.local;
    ssl_certificate     /etc/nginx/certs/_wildcard.test.local.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.test.local-key.pem;

    location / {
        proxy_pass http://confluence:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}