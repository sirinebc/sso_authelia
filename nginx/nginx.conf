server {
    listen 443 ssl;
    server_name auth.test.local;

    ssl_certificate     /etc/nginx/certs/_wildcard.test.local.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.test.local-key.pem;

    location / {
        # les communications entre conteneurs sont en http
        proxy_pass http://authelia:9091;
        proxy_set_header Host $host; # authelia vérifie que la req vient de domain = auth.test.local
    }
}

server {
    listen 443 ssl;
    server_name app.test.local;

    ssl_certificate     /etc/nginx/certs/_wildcard.test.local.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.test.local-key.pem;

    # avant de servir la page, verifier que l'user est auth
    location /authelia {
        internal; #l'user ne peut pas ya accéder directement avec requete externe
        proxy_pass http://authelia:9091/api/authz/forward-auth; # authelia verifie le cookie 
        proxy_set_header X-Forwarded-Method $request_method;
        proxy_set_header X-Forwarded-Proto https; # authelia n'accepte pas de traffic http
        proxy_set_header X-Forwarded-Host $host;   
        proxy_set_header Content-Length "";        
    }

    location / {
        auth_request /authelia;
        # l'app est la page par défaut de nginx
        root /usr/share/nginx/html;
    }
}