server {
    listen 443 ssl;
    server_name auth.test.local;
    ssl_certificate     /etc/nginx/certs/_wildcard.test.local.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.test.local-key.pem;

    location / {
        resolver 127.0.0.11 ipv6=off valid=30s;
        set $authelia_upstream http://authelia:9091;
        proxy_pass $authelia_upstream; # les communications entre conteneurs sont en http
        proxy_set_header Host $host; # authelia vérifie que la req vient de domain = auth.test.local
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host; 
    }
}

server {
    listen 443 ssl;
    server_name nextcloud.test.local;
    ssl_certificate     /etc/nginx/certs/_wildcard.test.local.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.test.local-key.pem;

    client_max_body_size 10G;
    proxy_read_timeout 3600s;
    proxy_request_buffering off;

    location = /.well-known/carddav {
        return 301 https://$host/remote.php/dav;
    }

    location = /.well-known/caldav {
        return 301 https://$host/remote.php/dav;
    }

    location ^~ /.well-known {
        return 301 https://$host/index.php$uri;
    }

    location = /internal/authelia/authz {
        internal;
        proxy_pass http://authelia:9091/api/verify;
        proxy_set_header Host $host;
        proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-URI $request_uri;
        proxy_set_header Content-Length "";
        proxy_pass_request_body off;
    }

    location = /login {
        return 302 https://$host/apps/user_oidc/login/1;
    }

    location = /index.php/login {
        return 302 https://$host/apps/user_oidc/login/1;
    }

    location / {
        auth_request /internal/authelia/authz;
        error_page 401 =302 https://auth.test.local/?rd=https://$http_host$request_uri;

        auth_request_set $auth_remote_user $upstream_http_remote_user;
        auth_request_set $auth_remote_groups $upstream_http_remote_groups;
        auth_request_set $auth_remote_name $upstream_http_remote_name;
        auth_request_set $auth_remote_email $upstream_http_remote_email;

        resolver 127.0.0.11 ipv6=off valid=30s;
        set $nextcloud_upstream http://nextcloud:80;
        proxy_pass $nextcloud_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Remote-User $auth_remote_user;
        proxy_set_header Remote-Groups $auth_remote_groups;
        proxy_set_header Remote-Name $auth_remote_name;
        proxy_set_header Remote-Email $auth_remote_email;
    }
}

